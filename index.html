<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATA BARCODE UM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f0f0f;
color:white;
padding:20px;
}

.header{
background:linear-gradient(135deg,#111,#1c1c1c);
border:1px solid #d4af37;
padding:25px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
box-shadow:0 0 20px rgba(212,175,55,.2);
}

.header h1{
color:#FFD700;
font-size:32px;
}

.header p{
color:#bbb;
margin-top:5px;
}

.card{
background:#181818;
border:1px solid #333;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:500;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#242424;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btn-save{
background:#FFD700;
color:black;
width:100%;
}

.search{
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.barcode-card{
background:#181818;
border:1px solid #333;
border-radius:15px;
overflow:hidden;
transition:.3s;
}

.barcode-card:hover{
transform:translateY(-5px);
border-color:#FFD700;
}

.barcode-card img{
width:100%;
height:220px;
object-fit:cover;
background:white;
}

.content{
padding:15px;
}

.content h3{
color:#FFD700;
margin-bottom:10px;
}

.action{
display:flex;
gap:10px;
margin-top:10px;
}

.delete{
background:#ff4444;
color:white;
flex:1;
}

.download{
background:#00c853;
color:white;
flex:1;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:20px;
}

.stat{
background:#181818;
padding:20px;
border-radius:15px;
border:1px solid #333;
text-align:center;
}

.stat h2{
color:#FFD700;
font-size:30px;
}
</style>
</head>
<body>

<div class="header">
<h1>DASHBOARD DATA BARCODE UM</h1>
<p>Sistem Penyimpanan & Manajemen Barcode</p>
</div>

<div class="stats">
<div class="stat">
<h2 id="totalData">0</h2>
<p>Total Barcode</p>
</div>
</div>

<div class="card">
<div class="form-group">
<label>Nama Barcode</label>
<input type="text" id="nama">
</div>

<div class="form-group">
<label>Upload Gambar Barcode</label>
<input type="file" id="foto" accept="image/*">
</div>

<button class="btn-save" onclick="simpanData()">
SIMPAN DATA
</button>
</div>

<div class="search">
<input type="text" id="search" placeholder="Cari Barcode..." onkeyup="renderData()">
</div>

<div class="grid" id="listData"></div>

<script>

let dataBarcode = JSON.parse(localStorage.getItem("barcodeUM")) || [];

function simpanData(){

const nama = document.getElementById("nama").value;
const foto = document.getElementById("foto").files[0];

if(!nama || !foto){
alert("Lengkapi data terlebih dahulu");
return;
}

const reader = new FileReader();

reader.onload = function(e){

dataBarcode.push({
id:Date.now(),
nama:nama,
foto:e.target.result,
tanggal:new Date().toLocaleString("id-ID")
});

localStorage.setItem("barcodeUM",JSON.stringify(dataBarcode));

document.getElementById("nama").value="";
document.getElementById("foto").value="";

renderData();
}

reader.readAsDataURL(foto);

}

function hapusData(id){

if(confirm("Hapus data ini ?")){
dataBarcode=dataBarcode.filter(x=>x.id!==id);
localStorage.setItem("barcodeUM",JSON.stringify(dataBarcode));
renderData();
}

}

function downloadFoto(src,nama){

const a=document.createElement("a");
a.href=src;
a.download=nama+".png";
a.click();

}

function renderData(){

const keyword=document.getElementById("search").value.toLowerCase();

let html='';

dataBarcode
.filter(x=>x.nama.toLowerCase().includes(keyword))
.reverse()
.forEach(item=>{

html+=`
<div class="barcode-card">

<img src="${item.foto}">

<div class="content">
<h3>${item.nama}</h3>

<p>${item.tanggal}</p>

<div class="action">

<button class="download"
onclick="downloadFoto('${item.foto}','${item.nama}')">
Download
</button>

<button class="delete"
onclick="hapusData(${item.id})">
Hapus
</button>

</div>

</div>

</div>
`;

});

document.getElementById("listData").innerHTML=html;
document.getElementById("totalData").innerText=dataBarcode.length;

}

renderData();

</script>

</body>
</html>
